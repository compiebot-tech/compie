services:
  - type: web
    name: compie-bot
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: API_KEY
        sync: false
      - key: GROUP_ID
        sync: false
      - key: API_URL
        sync: false
      - key: PORT
        value: 8080
